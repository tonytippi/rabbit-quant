# Strategy configuration for Rabbit-Quant
# Hurst and cycle parameters for signal generation and backtesting

[hurst]
threshold = 0.55
min_data_points = 256

[cycle]
min_period = 10
max_period = 200
projection_bars = 20
lowpass_cutoff = 0.1

[filters]
macro_filter_type = "both" # "hurst", "chop", or "both"
# HTF (Daily) must be < 45.0 to prove the macro trend is active
htf_threshold = 48
# LTF must be > 61.8 to prove local volatility has contracted (consolidation) before the cycle triggers
ltf_threshold = 52
veto_threshold = 3.0 # Volatility z-score veto

[backtest]
hurst_range = [0.35, 0.40, 0.45, 0.50, 0.55, 0.60]
phase_long_range = [4.0, 4.4, 4.712, 5.0, 5.5]
phase_short_range = [1.0, 1.3, 1.571, 1.8, 2.1]
initial_capital = 100000.0
commission = 0.001
output_dir = "data/backtest"
# Trailing Stop multipliers to sweep
trailing_atr_multiplier_range = [2.5, 3.0, 3.5]

[risk]
# Global risk parameters that may still apply
trailing_atr_multiplier = 3.0
breakeven_atr_threshold = 2.0
max_portfolio_exposure = 0.04 # Adjusted max exposure (2 concurrent trades * 2%)

[bot_a]
timeframes = []
max_concurrent_trades = 2
risk_per_trade = 0.02
hurst_min = 0.55
chop_htf_max = 45.0
ltf_chop_min = 61.8

[bot_b]
timeframes = []
max_concurrent_trades = 4
risk_per_trade = 0.01
max_holding_bars = 12
hurst_max = 0.55
chop_min = 58.0
take_profit_atr = 1.2
stop_loss_atr = 3.0
rsi_period = 14
rsi_oversold = 35
rsi_overbought = 65

[bot_c]
timeframes = ["15m", "1h"]
max_concurrent_trades = 4
risk_per_trade = 0.01
max_holding_bars = 12
take_profit_atr = 1.5
stop_loss_atr = 1.0
bb_window = 20
bb_std = 2.0
kc_window = 20
kc_multiplier = 1.5
rsi_period = 14
rsi_oversold = 30.0

[bot_d]
timeframes = ["15m", "1h"]
max_concurrent_trades = 4
risk_per_trade = 0.01
max_holding_bars = 12
take_profit_atr = 1.5
stop_loss_atr = 1.0
atr_ma_window = 50
rsi_period = 14
rsi_oversold = 20.0

[paper]
initial_balance = 1000.0
fixed_position_size = 100.0
use_dynamic_sizing = true